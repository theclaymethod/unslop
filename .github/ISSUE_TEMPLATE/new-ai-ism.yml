name: New AI-ism
description: Report a wild-caught AI-writing tell as a candidate eval row.
title: "[AI-ism] "
labels: ["ai-ism"]
body:
  - type: markdown
    attributes:
      value: |
        Read [CONTRIBUTING.md](../../CONTRIBUTING.md) first. This form catches
        a candidate before you build the row; if you've already run
        `scripts/contribute.py` through to a PR, open the PR directly instead.
  - type: textarea
    id: specimen
    attributes:
      label: Exact specimen
      description: >-
        Paste the exact sentence or paragraph, unmodified. Redact only after
        confirming below; the tell itself must stay byte-for-byte intact.
      placeholder: |
        Paste the full sentence or paragraph exactly as it appeared.
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Where seen
      description: Model, site, or input that produced this text.
      placeholder: "e.g. gpt-5.5, claude-sonnet, a specific blog post URL"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it reads as AI
      description: What makes this a reusable tell rather than a one-off phrasing.
    validations:
      required: false
  - type: checkboxes
    id: redaction
    attributes:
      label: Redaction confirmation
      options:
        - label: >-
            I've redacted names, numbers, or private details only where
            needed, and the tell remains byte-for-byte intact.
          required: true
