name: evals

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  adversarial:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile all scripts
        run: python -m py_compile scripts/*.py evals/*.py
      - name: Run adversarial regression harness
        run: python3 evals/run_adversarial.py
      - name: Behavioral manifest is in sync with the source cases
        run: python3 evals/build_shared_benchmark.py --check
      - name: Scanner catalog matches taboo docs
        run: python3 evals/check_taboo_parity.py
      - name: Install skill benchmark harness
        run: pipx install git+https://github.com/adewale/skill-eval-harness.git
      - name: Behavioral manifest passes strict leakage validation
        run: skill-benchmark validate evals/shared-benchmark.json --strict-leakage
